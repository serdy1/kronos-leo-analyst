name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'council-chamber/**'
      - '.github/workflows/firebase-deploy.yml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd council-chamber
          npm ci || npm install

      - name: Build Project
        run: |
          cd council-chamber
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_INVESTMENT_AGENT_COUNCIL }}'
          projectId: investment-agent-council
