name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'council-chamber/**'
      - '.github/workflows/firebase-deploy.yml'
      - 'bist_mcp_server.py'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        working-directory: council-chamber
        run: |
          npm install

      - name: Build Project
        working-directory: council-chamber
        run: |
          npm run build

      - name: Verify Build Artifacts
        run: |
          if [ -d "council-chamber/dist" ]; then
            echo "Build directory exists. Content:"
            ls -R council-chamber/dist
          else
            echo "Error: Build directory council-chamber/dist not found!"
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.Firebase_Hosting_Admin }}'
          projectId: investment-agent-council
          entryPoint: .
